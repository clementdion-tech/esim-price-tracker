<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eSIM Price Tracker — Kolet Competitive Intelligence</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="/css/style.css" rel="stylesheet" />
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark sticky-top shadow-sm">
  <div class="container-fluid px-4">
    <span class="navbar-brand fw-bold fs-5">
      <i class="bi bi-wifi me-2 text-primary"></i>eSIM Price Tracker
    </span>
    <div class="d-flex align-items-center gap-3">
      <span id="last-updated" class="text-secondary small"></span>
      <button class="btn btn-sm btn-outline-light" onclick="loadData()">
        <i class="bi bi-arrow-clockwise"></i> Refresh
      </button>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 py-4">

  <!-- Stats row -->
  <div class="row g-3 mb-4" id="stats-row">
    <div class="col-6 col-md-3"><div class="stat-card" id="stat-kolet"></div></div>
    <div class="col-6 col-md-3"><div class="stat-card" id="stat-airalo"></div></div>
    <div class="col-6 col-md-3"><div class="stat-card" id="stat-saily"></div></div>
    <div class="col-6 col-md-3"><div class="stat-card" id="stat-holafly"></div></div>
  </div>

  <!-- Price changes panel -->
  <div id="changes-panel" class="mb-4 d-none">
    <div class="section-card">
      <div class="section-header">
        <i class="bi bi-graph-up-arrow me-2"></i>Recent Price Changes
        <span class="badge bg-warning text-dark ms-2" id="changes-badge"></span>
      </div>
      <div id="changes-list" class="changes-grid"></div>
    </div>
  </div>

  <!-- New countries panel -->
  <div id="new-countries-panel" class="mb-4 d-none">
    <div class="section-card">
      <div class="section-header">
        <i class="bi bi-globe-americas me-2"></i>New Countries / Destinations
        <small class="text-muted ms-2">(added by competitors in the last 90 days)</small>
      </div>
      <div id="new-countries-list" class="d-flex flex-wrap gap-2 pt-2"></div>
    </div>
  </div>

  <!-- Filters -->
  <div class="section-card mb-4">
    <div class="row g-2 align-items-end">
      <div class="col-md-4">
        <label class="form-label small fw-semibold">Search country</label>
        <input type="text" id="filter-country" class="form-control form-control-sm"
          placeholder="e.g. France, Japan…" oninput="renderMatrix()" />
      </div>
      <div class="col-md-3">
        <label class="form-label small fw-semibold">Region</label>
        <select id="filter-region" class="form-select form-select-sm" onchange="renderMatrix()">
          <option value="">All regions</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label small fw-semibold">Plan type</label>
        <select id="filter-type" class="form-select form-select-sm" onchange="renderMatrix()">
          <option value="">All types</option>
          <option value="data">Data plans</option>
          <option value="unlimited">Unlimited</option>
          <option value="daily">Daily pass</option>
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label small fw-semibold">Show gaps only</label>
        <div class="form-check form-switch mt-1">
          <input class="form-check-input" type="checkbox" id="filter-gaps" onchange="renderMatrix()" />
          <label class="form-check-label small" for="filter-gaps">Gaps only</label>
        </div>
      </div>
    </div>
  </div>

  <!-- Comparison table -->
  <div class="section-card">
    <div class="section-header mb-3">
      <i class="bi bi-table me-2"></i>Pricing Comparison
      <span class="text-muted small ms-2" id="country-count"></span>
    </div>

    <div id="loading" class="text-center py-5">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-2 text-muted">Loading pricing data…</p>
    </div>

    <div id="no-data" class="text-center py-5 d-none text-muted">
      <i class="bi bi-database-slash fs-1"></i>
      <p class="mt-2">No pricing data yet. Run the scraper to populate.</p>
      <code class="small">npm run scrape</code>
    </div>

    <div id="matrix-container" class="d-none">
      <div id="matrix-accordion" class="accordion"></div>
    </div>
  </div>

</div>

<!-- Legend -->
<div class="container-fluid px-4 pb-4">
  <div class="d-flex flex-wrap gap-3 align-items-center small text-muted">
    <span><span class="legend-dot bg-success"></span> Price decrease</span>
    <span><span class="legend-dot bg-danger"></span> Price increase</span>
    <span><span class="legend-dot bg-secondary"></span> Gap (plan not available)</span>
    <span><span class="legend-dot border border-warning"></span> Cheapest in row</span>
  </div>
</div>

<script src="/js/dashboard.js"></script>
</body>
</html>
