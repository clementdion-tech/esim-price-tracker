name: Scrape eSIM Pricing

on:
  schedule:
    # Run on the 1st of every month at 06:00 UTC
    - cron: '0 6 1 * *'
  workflow_dispatch:
    inputs:
      providers:
        description: 'Comma-separated list of providers to scrape (leave empty for all)'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN || github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: QA — validate scrapers before full run
        run: |
          if [ -n "${{ github.event.inputs.providers }}" ]; then
            node src/test.js --only=${{ github.event.inputs.providers }}
          else
            node src/test.js
          fi

      - name: Run scrapers
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
        run: |
          if [ -n "${{ github.event.inputs.providers }}" ]; then
            node src/scrapers/index.js --only=${{ github.event.inputs.providers }}
          else
            node src/scrapers/index.js
          fi

      - name: Check for data changes
        id: diff
        run: |
          git diff --quiet data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: update pricing data $(date -u +%Y-%m-%d)"
          git push

      - name: Summary
        run: |
          echo "## Scrape Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data/current.json ]; then
            PLANS=$(node -e "const d=require('./data/current.json'); console.log(d.plans.length)")
            echo "- **Total plans scraped:** $PLANS" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Data changed:** ${{ steps.diff.outputs.changed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run at:** $(date -u)" >> $GITHUB_STEP_SUMMARY
